<!doctype html>
<html id="html-content" lang="fa">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="./style.css" rel="stylesheet">
  <title>سامانه مستمری جمع</title>
  <style>
    @font-face {
      font-family: 'IRANYekanM';
      src: url('./IRANYekanFN-Medium.ttf');
    }

    @font-face {
      font-family: 'IRANYekanB';
      src: url('./IRANYekanFN-ExtraBold.ttf');
    }

    @font-face {
      font-family: 'Titr';
      src: url('./Titr.otf');
    }

    table {
      width: 80%;
      margin-inline: auto;
      border: 1px solid #000;
      border-radius: 10px;
      font-family: IRANYekanM;
      margin-top: 20px;
    }

    th,
    td {
      padding: 10px;
      text-align: center;
      border: 1px solid #ddd;
    }

    th {
      background-color: #f2f2f2;
    }

    tr {
      border-bottom: 2px solid #ddd;
    }

    tr:last-child {
      border-bottom: none;
    }
  </style>
</head>

<body class='html-content' style="direction: rtl;">
  <div
    style="width: 60%;margin-right: auto;margin-top: 45px;margin-left: auto;border-radius: 5px;border-color: #000; border-width: 1px;border-style: solid; padding: 25px;">
    <div style="width:100%;display: flex;justify-content: space-between;margin-bottom: 60px;align-items: center;">
      <div style="display:flex;flex-direction:column;text-align:center;align-items: center;">
        <img src="./vezaratLogo.png" style="width:180px;" />
      </div>
      <p style="font-family: Titr;font-size: 30px;margin:0px;text-align:center;"> حکم بازنشستگی </p>
      <div style="display: flex;flex-direction: column;align-items: center;">
        <img src="./Qr.png" style="width:100px;" />
      </div>
    </div>

    <!-- متن توضیحات -->
    <p id="pension-text" style="font-family: IRANYekan;color: black;">
      در حال بارگذاری اطلاعات...
    </p>

    <br />

    <!-- جدول -->
    <div class="margin-top:10px;margin-bottom:10px">
      <span style="font-family: IRANYekanB; margin-right:5px;margin-left:5px;">سوابق و مبالغ مستمری</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>نام صندوق بازنشستگی</th>
          <th>سوابق قابل احتساب</th>
          <th>مبلغ مستمری ماهیانه (ریال)</th>
        </tr>
      </thead>
      <tbody id="pension-table">
        <tr>
          <td colspan="3">در حال بارگذاری...</td>
        </tr>
      </tbody>
    </table>

    <div class="margin-top:10px;margin-bottom:10px">
      <p style="font-family: IRANYekanM; margin-right:5px;margin-left:5px;">
        پرداخت مستمری ماهیانه به حساب معرفی شده توسط فرد صورت خواهد گرفت.
      </p>
    </div>
    <div style="margin-top:15px;">
      <span style="font-family: IRANYekanB;">
        با آرزوی سلامتی و موفقیت روزافزون
      </span>
    </div>
    <div style="display: flex;justify-content: end;">
      <img src="./sign.png" width="120px" />
    </div>
  </div>


  <script type="text/javascript" src="./cdn.js"></script>
  <script type="text/javascript" src="./html2canvas.js"></script>
  <!-- <script src="./googleapi.js" type="text/javascript"></script> -->
  <script>
    // گرفتن مقدار از URL
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(";").shift();
    }

    async function loadPensionData() {
      try {
        // فرض: توی URL داری ?token=abcd123
        //  const token = getQueryParam("user"); 
        // const userId = getQueryParam("user"); // مثلا اگر userId هم باشه
        const userId = getQueryParam("user"); // مثلا اگر userId هم باشه
       
        const response = await fetch("http://localhost:5100/api/Experts/ExportDoc", {
          method: "GET",
          headers: {
            "Content-Type": "application/json",
            //   "Authorization": token ? `Bearer ${token}` : "",
            // "Document": userId ?? "" // هدر سفارشی
            "Document":  getCookie("user") ?? "" // هدر سفارشی
          }
        });
        console.log(response)

        if (!response.ok) throw new Error("خطا در دریافت اطلاعات");

        const dto = await response.json();

        // 🔹 متن معرفی
        document.getElementById("pension-text").innerHTML =
          `بدین وسیله اعلام می‌گردد که <span style="font-family: IRANYekanB;">${dto.fullName}</span>
        با کد ملی <span style="font-family: IRANYekanB;">${dto.nationalCode}</span>
        و شماره بیمه <span style="font-family: IRANYekanB;">${dto.insuranceNumber}</span>
        و تاریخ تولد <span style="font-family: IRANYekanB;">${dto.birthDate}</span>
        از تاریخ <span style="font-family: IRANYekanB;">${dto.exportDate}</span>
        مشمول دریافت مستمری بازنشستگی می‌باشد.`

        // 🔹 جدول
        const table = document.getElementById("pension-table");
        table.innerHTML = "";
        dto.insuranceDetails.forEach(item => {
          table.innerHTML += `
          <tr>
            <td>${item.insuranceName}</td>
            <td>${item.records}</td>
            <td>${item.pension}</td>
          </tr>
        `;
        });
        var HTML_Width = $(".html-content").width();
        var HTML_Height = $(".html-content").height();
        var top_left_margin = 15;
        var PDF_Width = HTML_Width + (top_left_margin * 2);
        var PDF_Height = (PDF_Width * 1.5) + (top_left_margin * 2);
        var canvas_image_width = HTML_Width;
        var canvas_image_height = HTML_Height;

        var totalPDFPages = Math.ceil(HTML_Height / PDF_Height) - 1;

        html2canvas($(".html-content")[0]).then(function (canvas) {
          var imgData = canvas.toDataURL("image/jpeg", 1.0);
          var pdf = new jsPDF('p', 'pt', [PDF_Width, PDF_Height]);
          pdf.addImage(imgData, 'JPG', top_left_margin, top_left_margin, canvas_image_width, canvas_image_height);
          for (var i = 1; i <= totalPDFPages; i++) {
            pdf.addPage(PDF_Width, PDF_Height);
            pdf.addImage(imgData, 'JPG', top_left_margin, -(PDF_Height * i) + (top_left_margin * 4), canvas_image_width, canvas_image_height);
          }
          pdf.save("حکم-بازنشستگی.pdf");
          // $(".html-content").hide();
        });
      } catch (err) {
        document.getElementById("pension-text").innerText = "❌ خطا در دریافت اطلاعات";
        console.error(err);
      }
    }




    loadPensionData();

  </script>

</body>

</html>
